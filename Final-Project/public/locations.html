<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoRide Task-L | Locations</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-gray-800">

  <!-- HEADER -->
  <header class="bg-white shadow-md fixed top-0 left-0 w-full z-20">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <a href="/index.html" class="text-2xl font-bold text-green-600">EcoRide</a>
      <nav class="hidden md:flex space-x-6">
        <a href="/index.html" class="hover:text-green-600">Home</a>
        <a href="/catalog.html" class="hover:text-green-600">Catalog</a>
        <a href="/locations.html" class="hover:text-green-600">Locations</a>
        <a href="/signup.html" class="hover:text-green-600">Sign Up</a>
        <a href="/login.html" class="hover:text-green-600">Log In</a>
      </nav>
    </div>
  </header>

  <main class="mt-20 py-12 bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto px-6">
      <section class="relative overflow-hidden rounded-3xl mb-12">
        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover">
          <source src="/videos/12766776_3840_2160_60fps.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
        <div class="relative bg-black/50 px-6 py-20 text-center text-white rounded-3xl">
          <h1 class="text-4xl md:text-5xl font-bold mb-3">Our Rental Locations</h1>
          <p class="mx-auto max-w-2xl text-lg md:text-xl text-white/90">
            Find the best pickup locations near you and choose the most convenient place for your rental.
          </p>
        </div>
      </section>

      <div id="locationsGrid" class="grid gap-8 md:grid-cols-3"></div>
      <div id="locationsError" class="hidden text-center text-red-600 mt-8">Failed to load locations. Please try again later.</div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-300 py-10">
    <div class="max-w-6xl mx-auto text-center">
      <p class="text-sm">&copy; 2025 EcoRide. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const fallbackLocations = [
      {
        name: 'Harbor View Station',
        address: '18 Shoreline Ave, City Center',
        capacity: 24,
        created_at: new Date().toISOString(),
      },
      {
        name: 'Parkside Hub',
        address: '102 Greenway Blvd, Riverside',
        capacity: 18,
        created_at: new Date().toISOString(),
      },
      {
        name: 'Uptown Charge Point',
        address: '74 Civic Plaza, Uptown',
        capacity: 30,
        created_at: new Date().toISOString(),
      },
    ];

    function renderLocations(locations) {
      const grid = document.getElementById('locationsGrid');
      grid.innerHTML = locations.map(location => `
        <div class="bg-white rounded-3xl shadow p-6">
          <img src="/images/primeebike-header2.png" alt="${location.name}" class="w-full h-48 object-cover rounded-3xl mb-4">
          <h2 class="text-2xl font-semibold text-green-700 mb-3">${location.name}</h2>
          <p class="text-gray-600 mb-4">${location.address}</p>
          <p class="font-semibold text-gray-900">Capacity: ${location.capacity}</p>
          <p class="text-sm text-gray-500 mt-2">Added: ${new Date(location.created_at).toLocaleDateString()}</p>
        </div>
      `).join('');
    }

    async function loadLocations() {
      const locationsError = document.getElementById('locationsError');

      try {
        const response = await fetch('/api/locations');
        const data = await response.json();

        if (!response.ok || !Array.isArray(data.locations)) {
          throw new Error(data.error || 'Unable to load locations');
        }

        if (data.locations.length === 0) {
          renderLocations(fallbackLocations);
          return;
        }

        renderLocations(data.locations);
      } catch (err) {
        console.error('Error loading locations:', err);
        locationsError.classList.remove('hidden');
        renderLocations(fallbackLocations);
      }
    }

    loadLocations();
  </script>
</body>
</html>
