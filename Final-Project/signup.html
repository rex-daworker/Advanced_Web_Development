<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoRide Task-L | Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-gray-800">

  <!-- HEADER -->
  <header class="bg-white shadow-md fixed top-0 left-0 w-full z-20">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <h1 class="text-2xl font-bold text-green-600">EcoRide</h1>
      <nav class="hidden md:flex space-x-6">
        <a href="index.html" class="hover:text-green-600">Home</a>
        <a href="catalog.html" class="hover:text-green-600">Catalog</a>
        <a href="signup.html" class="hover:text-green-600">Sign Up</a>
        <a href="login.html" class="hover:text-green-600">Log In</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="mt-20 min-h-screen flex items-center justify-center bg-gradient-to-br from-green-700 via-blue-700 to-green-800 p-6">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-8">
      <h2 class="text-2xl font-bold text-green-700 mb-6">Create Your Account</h2>

      <!-- Pointer to Log In -->
      <p class="mb-6 text-sm text-gray-600">
        Already have an account? 
        <a href="login.html" class="text-blue-600 hover:underline">Log in here</a>.
      </p>

      <form action="#" method="post" class="space-y-4">

        <!-- Name -->
        <div>
          <label for="signup-name" class="block text-sm font-medium text-gray-700">Full Name</label>
          <input type="text" id="signup-name" name="name" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <!-- Email -->
        <div>
          <label for="signup-email" class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="signup-email" name="email" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <!-- Password -->
        <div>
          <label for="signup-password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="signup-password" name="password" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <!-- Age -->
        <div>
          <label for="signup-age" class="block text-sm font-medium text-gray-700">Age</label>
          <input type="number" id="signup-age" name="age" min="13" max="120" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-green-500 focus:border-green-500">
        </div>

        <!-- Country -->
        <div>
          <label for="signup-country" class="block text-sm font-medium text-gray-700">Country</label>
          <select id="signup-country" name="country" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-green-500 focus:border-green-500">
            <option value="">Select your country</option>
            <option value="finland">Finland</option>
            <option value="nigeria">Nigeria</option>
            <option value="usa">United States</option>
            <option value="uk">United Kingdom</option>
            <option value="germany">Germany</option>
            <option value="france">France</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Language -->
        <div>
          <label for="signup-language" class="block text-sm font-medium text-gray-700">Preferred Language</label>
          <select id="signup-language" name="language" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-green-500 focus:border-green-500">
            <option value="">Select your language</option>
            <option value="english">English</option>
            <option value="finnish">Finnish</option>
            <option value="french">French</option>
            <option value="german">German</option>
            <option value="spanish">Spanish</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Sex -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Sex</label>
          <div class="mt-1 flex space-x-4">
            <label class="flex items-center">
              <input type="radio" name="sex" value="male" required class="mr-2"> Male
            </label>
            <label class="flex items-center">
              <input type="radio" name="sex" value="female" required class="mr-2"> Female
            </label>
            <label class="flex items-center">
              <input type="radio" name="sex" value="other" required class="mr-2"> Other
            </label>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">Sign Up</button>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-gray-300 py-10">
    <div class="max-w-6xl mx-auto text-center">
      <p class="text-sm">&copy; 2025 EcoRide. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
