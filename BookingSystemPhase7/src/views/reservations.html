<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reservations | Booking System</title>
  <link rel="stylesheet" href="/index.css" />
</head>

<body class="min-h-screen bg-gray-50">
  <header class="p-4 bg-white shadow">
    <h1 class="text-2xl font-bold">Reservations</h1>
  </header>

  <main class="max-w-4xl mx-auto p-6">
    <!-- Reservation Form -->
    <section class="bg-white p-6 rounded-xl shadow mb-8">
      <h2 class="text-xl font-semibold mb-4">Reservation Form</h2>

      <form id="reservationForm" class="grid gap-4">
        <input id="reservationId" type="hidden" />

        <div>
          <label>Resource ID</label>
          <input id="resourceId" type="number" class="input" />
        </div>

        <div>
          <label>User ID</label>
          <input id="userId" type="number" class="input" />
        </div>

        <div>
          <label>Start Time</label>
          <input id="startTime" type="datetime-local" class="input" />
        </div>

        <div>
          <label>End Time</label>
          <input id="endTime" type="datetime-local" class="input" />
        </div>

        <div>
          <label>Note</label>
          <input id="note" type="text" class="input" />
        </div>

        <div>
          <label>Status</label>
          <select id="status" class="input">
            <option value="active">Active</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>

        <div class="flex gap-4 mt-4">
          <button id="createBtn" class="btn-primary">Create</button>
          <button id="updateBtn" class="btn-secondary">Update</button>
          <button id="deleteBtn" class="btn-danger">Delete</button>
        </div>
      </form>
    </section>

    <!-- Reservation List -->
    <section class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-semibold mb-4">Existing Reservations</h2>
      <div id="reservationList" class="space-y-2"></div>
    </section>
  </main>

  <script src="/reservations.js"></script>
</body>
</html>
