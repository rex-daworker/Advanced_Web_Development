<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoRide Task-L | Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-gray-800">

  <!-- HEADER -->
  <header class="bg-white shadow-md fixed top-0 left-0 w-full z-20">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <h1 class="text-2xl font-bold text-green-600">EcoRide</h1>
      <nav class="hidden md:flex space-x-6">
        <a href="index.html" class="hover:text-green-600">Home</a>
        <a href="catalog.html" class="hover:text-green-600">Catalog</a>
        <a href="signup.html" class="hover:text-green-600">Sign Up</a>
        <a href="login.html" class="hover:text-green-600">Log In</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="mt-20 min-h-screen flex items-center justify-center bg-gradient-to-br from-green-700 via-blue-700 to-green-800 p-6">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-8">
      <h2 class="text-2xl font-bold text-blue-700 mb-6">Log In</h2>
      <form action="#" method="post" class="space-y-4">
        <!-- Email -->
        <div>
          <label for="login-email" class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="login-email" name="email" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <!-- Password -->
        <div>
          <label for="login-password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="login-password" name="password" required class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <!-- Submit -->
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Log In</button>
      </form>
      <p class="mt-4 text-sm text-gray-600">
        Don’t have an account? <a href="signup.html" class="text-green-600 hover:underline">Sign Up here</a>.
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-gray-300 py-10">
    <div class="max-w-6xl mx-auto text-center">
      <p class="text-sm">&copy; 2025 EcoRide. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
