<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoRide Task-L | Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-gray-800">

  <!-- HEADER -->
  <header class="bg-white shadow-md fixed top-0 left-0 w-full z-20">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <a href="/index.html"><h1 class="text-2xl font-bold text-green-600">EcoRide</h1></a>
      <nav class="hidden md:flex space-x-6">
        <a href="/index.html" class="hover:text-green-600">Home</a>
        <a href="/catalog.html" class="hover:text-green-600">Catalog</a>
        <a href="/locations.html" class="hover:text-green-600">Locations</a>
        <a href="/signup.html" class="hover:text-green-600">Sign Up</a>
        <a href="/login.html" class="hover:text-green-600">Log In</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="mt-20 min-h-screen flex items-center justify-center bg-gradient-to-br from-green-700 via-blue-700 to-green-800 p-6">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-8">
      <h2 class="text-2xl font-bold text-blue-700 mb-6">Create Account</h2>
      
      <!-- Error/Success Messages -->
      <div id="messageBox"></div>

      <form id="signupForm" class="space-y-4">
        <!-- First Name -->
        <div>
          <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
          <input type="text" id="firstName" name="firstName" required 
                 class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <!-- Last Name -->
        <div>
          <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
          <input type="text" id="lastName" name="lastName" required 
                 class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <!-- Email -->
        <div>
          <label for="signup-email" class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="signup-email" name="email" required 
                 class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <!-- Password -->
        <div>
          <label for="signup-password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="signup-password" name="password" required 
                 class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
          <small class="text-gray-500">Min 8 chars, 1 uppercase, 1 number</small>
        </div>
        <!-- Confirm Password -->
        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required 
                 class="mt-1 w-full border rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <!-- Submit -->
        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">
          Sign Up
        </button>
      </form>
      <p class="mt-4 text-sm text-gray-600">
        Already have an account? <a href="/login.html" class="text-blue-600 hover:underline">Log In here</a>.
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-gray-300 py-10">
    <div class="max-w-6xl mx-auto text-center">
      <p class="text-sm">&copy; 2025 EcoRide. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const messageBox = document.getElementById('messageBox');

      // Client-side validation
      if (password !== confirmPassword) {
        messageBox.innerHTML = `
          <div class="p-4 bg-red-100 border border-red-400 text-red-700 rounded mb-4">
            Passwords do not match
          </div>
        `;
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email, password, confirmPassword })
        });

        const data = await response.json();

        if (!response.ok) {
          const errorMsg = data.errors?.[0]?.message || data.error || 'Registration failed';
          messageBox.innerHTML = `
            <div class="p-4 bg-red-100 border border-red-400 text-red-700 rounded mb-4">
              ${errorMsg}
            </div>
          `;
          return;
        }

        // Store token
        localStorage.setItem('token', data.token);

        // Show success message
        messageBox.innerHTML = `
          <div class="p-4 bg-green-100 border border-green-400 text-green-700 rounded mb-4">
            Account created! Redirecting to catalog...
          </div>
        `;

        // Redirect to catalog
        setTimeout(() => {
          window.location.href = '/catalog.html';
        }, 1500);
      } catch (err) {
        console.error('Signup error:', err);
        messageBox.innerHTML = `
          <div class="p-4 bg-red-100 border border-red-400 text-red-700 rounded mb-4">
            Connection error. Please try again.
          </div>
        `;
      }
    });
  </script>
</body>
</html>
